name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact: ClaudeGUI-*.dmg
          - os: windows-latest
            platform: win
            artifact: ClaudeGUI Setup *.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Electron/二进制用国内镜像加速，避免 CI 安装时去 GitHub 下载超时
      # 注意：electron_mirror 是 Electron 安装脚本读的环境变量，不是 npm config 选项
      - name: Configure Electron mirrors
        run: echo "Mirrors set via env (next step)"

      - name: Install dependencies
        run: npm install
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Build (tsc + vite)
        run: npm run build

      - name: Package (${{ matrix.platform }})
        run: npm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeGUI-${{ matrix.platform }}
          path: release/${{ matrix.artifact }}
          if-no-files-found: warn
